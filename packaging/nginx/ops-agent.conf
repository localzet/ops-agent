upstream ops_agent_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name ops-agent.example.com;

    ssl_certificate /etc/letsencrypt/live/ops-agent.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ops-agent.example.com/privkey.pem;

    client_max_body_size 64k;

    location = /health/live {
        proxy_pass http://ops_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://ops_agent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}

server {
    listen 80;
    server_name ops-agent.example.com;
    return 301 https://$host$request_uri;
}
