server:
  host: "127.0.0.1"
  port: 8080
  threads: 4
  timeout_sec: 5
  max_request_body_bytes: 65536

diagnostics:
  tcp_timeout_ms: 2000
  systemctl_timeout_ms: 2000
  max_services_per_request: 20

logging:
  level: "info"

storage:
  sqlite_path: "/var/lib/ops-agent/ops-agent.db"

security:
  api_key: ""

rate_limit:
  enabled: true
  requests_per_second: 10
  burst: 20
